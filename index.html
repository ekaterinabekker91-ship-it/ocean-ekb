<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <title>Ocean Themed Page</title>
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #b3e0ff; /* Light blue background */
            color: #003366; /* Dark blue text color */
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 0.5em;
        }
        p {
            font-size: 1.5em;
            line-height: 1.4;
        }
        .ocean {
            background: url('https://example.com/ocean-background.jpg') center center/cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <div class="ocean">
        <h1>Добро пожаловать в океан!</h1>
        <p>Изучайте красоту и глубину морского мира.</p>
    </div>
</body>
</html>
