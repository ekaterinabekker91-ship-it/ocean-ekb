<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аквариум Екатеринбург</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #00aaff, #004d99);
            overflow: hidden;
            position: relative;
        }
        h1 {
            color: white;
            text-align: center;
            padding-top: 50px;
            font-size: 3em;
        }
        .button {
            display: block;
            width: 200px;
            margin: 0 auto;
            padding: 10px;
            text-align: center;
            background: #ffeb3b;
            color: #000;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .button:hover {
            background: #fdd835;
        }
        .bubbles {
            position: absolute;
            bottom: -150px;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }
        .bubble {
            position: absolute;
            bottom: 0;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: float 5s infinite;
        }
        @keyframes float {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(-1000px);
            }
        }
    </style>
</head>
<body>
    <h1>Добро пожаловать в Аквариум Екатеринбург</h1>
    <a href="https://max.ru/id503501079307_1_bot?startapp=TL561a5f06e5e5" class="button">Погрузиться</a>
    <div class="bubbles">
        <div class="bubble" style="width: 60px; height: 60px; left: 20%; animation-duration: 6s;"></div>
        <div class="bubble" style="width: 80px; height: 80px; left: 50%; animation-duration: 8s;"></div>
        <div class="bubble" style="width: 50px; height: 50px; left: 80%; animation-duration: 5s;"></div>
    </div>
</body>
</html>
